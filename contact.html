<header>
    <h1>Charigee Djojodikromo</h1>

    <a href="index.html">Home</a>

</nav>
 
<section id="contact">
    <h2>Contact</h2>
 
    <div class="card contact-grid">
        <div class="contact-info">
            <h3>Mijn gegevens</h3>
            <p>Email: <a href="mailto:256010@unasat.sr">256010@unasat.sr</a></p>
            <p>Telefoon: +597 810-9892</p>
        </div>
 
        <div class="contact-form">
            <h3>Stuur een bericht</h3>
            <div class="form-group">
                <label for="name">Naam</label>
                <input type="text" id="name" placeholder="Jouw naam">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="jouw@email.com">
            </div>
            <div class="form-group">
                <label for="message">Bericht</label>
                <textarea id="message" rows="5" placeholder="Jouw bericht..."></textarea>
            </div>
            <button id="send-btn">Verstuur bericht</button>
            <p id="form-feedback"></p>
        </div>
    </div>
</section>
